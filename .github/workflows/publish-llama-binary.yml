name: Publish Llama Binary Artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Build and validate without committing, tagging, or uploading"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish llama.xcframework
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build XCFramework archive
        run: Scripts/build-llama-xcframework.sh

      - name: Configure Package.swift binary target
        id: artifact
        run: |
          TAG="${{ inputs.tag }}"
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/llama.xcframework.zip"
          CHECKSUM="$(cat Vendor/llama-artifacts/release/llama.xcframework.zip.checksum)"

          Scripts/set-llama-binary-artifact.sh "$URL" "$CHECKSUM"

          {
            echo "tag=$TAG"
            echo "url=$URL"
            echo "checksum=$CHECKSUM"
          } >> "$GITHUB_OUTPUT"

      - name: Validate package against local binary artifact
        run: |
          export CARBOCATION_LOCAL_LLM_BINARY_ARTIFACT_PATH="Vendor/llama-artifacts/release/llama.xcframework"

          swift test

          build_ios_target() {
            local target="$1"
            local sdk_name="$2"
            local triple="$3"

            local sdk_path
            sdk_path="$(xcrun --sdk "$sdk_name" --show-sdk-path)"
            swift build \
              --disable-sandbox \
              --target "$target" \
              --triple "$triple" \
              --sdk "$sdk_path"
          }

          for target in CarbocationLocalLLMRuntime CarbocationLocalLLMUI; do
            build_ios_target "$target" iphoneos arm64-apple-ios17.0
            build_ios_target "$target" iphonesimulator arm64-apple-ios17.0-simulator
            build_ios_target "$target" iphonesimulator x86_64-apple-ios17.0-simulator
          done

          build_ios_smoke_app() {
            local label="$1"
            local destination="$2"
            local arch="$3"
            local derived_data_path="$4"

            echo "Building CLLMSmokeIOS for $label"
            xcodebuild build \
              -project CarbocationLocalLLM.xcodeproj \
              -scheme CLLMSmokeIOS \
              -destination "$destination" \
              -derivedDataPath "$derived_data_path" \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              ARCHS="$arch"
          }

          build_ios_smoke_app "iOS device arm64" "generic/platform=iOS" arm64 ".build/XcodeDerivedData-iOS-arm64"
          build_ios_smoke_app "iOS simulator arm64" "generic/platform=iOS Simulator" arm64 ".build/XcodeDerivedData-iOSSimulator-arm64"
          build_ios_smoke_app "iOS simulator x86_64" "generic/platform=iOS Simulator" x86_64 ".build/XcodeDerivedData-iOSSimulator-x86_64"

      - name: Summarize dry run
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Dry run complete"
            echo ""
            echo "- Tag: ${{ steps.artifact.outputs.tag }}"
            echo "- Asset: Vendor/llama-artifacts/release/llama.xcframework.zip"
            echo "- URL: ${{ steps.artifact.outputs.url }}"
            echo "- Checksum: ${{ steps.artifact.outputs.checksum }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit release manifest and tag release
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.artifact.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "error: tag already exists locally: $TAG" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "error: tag already exists on origin: $TAG" >&2
            exit 1
          fi

          git add Package.swift
          git diff --cached --check
          git commit -m "Publish llama binary artifact $TAG"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.artifact.outputs.tag }}"
          TITLE="$TAG"
          PRERELEASE_FLAG=""

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > release-notes.md <<EOF
          SwiftPM binary artifact for CarbocationLocalLLM's llama runtime.

          Checksum:
          \`${{ steps.artifact.outputs.checksum }}\`
          EOF

          gh release create "$TAG" \
            "Vendor/llama-artifacts/release/llama.xcframework.zip" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG

      - name: Validate published binary release
        if: ${{ !inputs.dry_run }}
        run: |
          release_smoke_passed=0
          for attempt in 1 2 3 4 5 6; do
            if Scripts/test-binary-release.sh "${{ steps.artifact.outputs.tag }}"; then
              release_smoke_passed=1
              break
            fi

            echo "release smoke failed on attempt $attempt; retrying after release asset propagation delay"
            sleep 10
          done

          if [[ "$release_smoke_passed" != "1" ]]; then
            echo "release smoke failed after retries" >&2
            exit 1
          fi

          build_ios_smoke_app() {
            local label="$1"
            local destination="$2"
            local arch="$3"
            local derived_data_path="$4"

            echo "Building CLLMSmokeIOS for $label against published artifact"
            xcodebuild build \
              -project CarbocationLocalLLM.xcodeproj \
              -scheme CLLMSmokeIOS \
              -destination "$destination" \
              -derivedDataPath "$derived_data_path" \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              ARCHS="$arch"
          }

          build_ios_smoke_app "iOS device arm64" "generic/platform=iOS" arm64 ".build/XcodeDerivedData-Release-iOS-arm64"
          build_ios_smoke_app "iOS simulator arm64" "generic/platform=iOS Simulator" arm64 ".build/XcodeDerivedData-Release-iOSSimulator-arm64"
          build_ios_smoke_app "iOS simulator x86_64" "generic/platform=iOS Simulator" x86_64 ".build/XcodeDerivedData-Release-iOSSimulator-x86_64"
